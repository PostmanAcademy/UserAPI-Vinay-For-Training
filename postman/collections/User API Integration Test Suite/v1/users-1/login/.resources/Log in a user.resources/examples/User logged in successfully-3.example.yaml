$kind: http-example
name: User logged in successfully
request:
  url: "{{baseUrl}}/v1/users/login"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "username": "string",
        "password": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 1706,
        "username": "string",
        "token": "string"
      }
order: 10000

$kind: http-example
description: |-
  A new user account was created successfully. The response includes the user's assigned `id`, their `username`, and a `token` for authenticating future requests. Store the token securely and include it in the `Authorization` header for protected endpoints.
request:
  url: "{{baseUrl}}/v1/users/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "username": "string",
        "password": "string"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": 7053,
        "username": "string",
        "token": "string"
      }
order: 1000

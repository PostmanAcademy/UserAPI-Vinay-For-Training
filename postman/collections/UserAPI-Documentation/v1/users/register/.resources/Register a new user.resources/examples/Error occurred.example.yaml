$kind: http-example
description: |-
  An unexpected server-side error occurred while processing the registration request. The response body contains a `message` field with details about the error. Check server logs for more information and retry the request if the issue is transient.
request:
  url: "{{baseUrl}}/v1/users/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "username": "string",
        "password": "string"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "string"
      }
order: 2000

$kind: http-request
name: Retrieve a user
url: "{{baseUrl}}/v1/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{id}}"
    $type: ""
body:
  type: text
  content: ""
examples: ./.resources/Retrieve a user.resources/examples
order: 1000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
